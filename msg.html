        function renderCards() {
            const container = document.getElementById('cards-container');
            container.innerHTML = '';
            const globalUrl = document.getElementById('global-url').value.trim();

            msgData.forEach((msg, index) => {
                const linkValue = `${globalUrl}#${msg.anchor}`;
                
                // 這裡拿掉了 readonly，讓你可以在網頁上自由編輯
                const html = `
                    <div class="msg-card" data-index="${index}">
                        <span class="tag-badge">${msg.tag}</span>
                        <span class="anchor-badge">#${msg.anchor}</span>
                        <h3 class="msg-title">${msg.title}</h3>
                        
                        <div class="sub-box">
                            <div class="sub-box-header">
                                <span class="sub-box-title">📄 內文 (可直接編輯微調)</span>
                                <button class="copy-btn" onclick="copyContent('content-${index}', this)">複製內文</button>
                            </div>
                            <textarea id="content-${index}" class="edit-content">${msg.content}</textarea>
                        </div>

                        <div class="sub-box">
                            <div class="sub-box-header">
                                <span class="sub-box-title">✍️ 按鈕文字</span>
                                <button class="copy-btn" onclick="copyContent('btnText-${index}', this)">複製文字</button>
                            </div>
                            <input type="text" id="btnText-${index}" class="edit-btnText" value="${msg.btnText}">
                        </div>

                        <div class="sub-box">
                            <div class="sub-box-header">
                                <span class="sub-box-title">🔗 專屬連結</span>
                                <button class="copy-btn" onclick="copyContent('btnLink-${index}', this)">複製連結</button>
                            </div>
                            <input type="text" id="btnLink-${index}" class="link-input" data-anchor="${msg.anchor}" value="${linkValue}">
                        </div>
                    </div>
                `;
                container.innerHTML += html;
            });
        }

        function copyContent(elementId, btnElement) {
            const el = document.getElementById(elementId);
            el.select();
            el.setSelectionRange(0, 99999);
            document.execCommand('copy');

            const originalText = btnElement.innerText;
            btnElement.innerText = '✅ 已複製';
            btnElement.classList.add('success');
            setTimeout(() => {
                btnElement.innerText = originalText;
                btnElement.classList.remove('success');
            }, 1500);
        }

        function updateAllLinks() {
            const globalUrl = document.getElementById('global-url').value.trim();
            const linkInputs = document.querySelectorAll('.link-input');
            linkInputs.forEach(input => {
                const anchor = input.getAttribute('data-anchor');
                input.value = `${globalUrl}#${anchor}`;
            });
            
            // 按鈕視覺回饋
            const btns = document.querySelectorAll('.copy-btn');
            btns[0].innerText = '✅ 已更新';
            btns[0].classList.add('success');
            setTimeout(() => { btns[0].innerText = '🔄 替換所有連結'; btns[0].classList.remove('success'); }, 1500);
        }

        // === 將網頁上的修改匯出成 txt 檔 ===
        function exportToTxt() {
            const cards = document.querySelectorAll('.msg-card');
            let txtContent = "";

            cards.forEach((card) => {
                const index = card.getAttribute('data-index');
                const title = msgData[index].title; // 標題保持原本的
                const content = card.querySelector('.edit-content').value;
                const btnText = card.querySelector('.edit-btnText').value;

                txtContent += `### ${title}\n\n`;
                txtContent += `${content}\n\n`;
                txtContent += `👉 **[按鈕文字]**：${btnText}\n\n`;
                txtContent += `---\n\n`;
            });

            // 建立下載檔案的 Blob (使用 UTF-8 並加上 BOM 避免 Windows 亂碼)
            const blob = new Blob(["\ufeff" + txtContent], { type: 'text/plain;charset=utf-8' });
            const url = URL.createObjectURL(blob);
            
            const a = document.createElement('a');
            a.href = url;
            a.download = "messages_updated.txt";
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
            
            // 按鈕視覺回饋
            const btns = document.querySelectorAll('.copy-btn');
            btns[1].innerText = '✅ 下載成功';
            btns[1].classList.add('success');
            setTimeout(() => { btns[1].innerText = '📥 匯出更新版 TXT'; btns[1].classList.remove('success'); }, 2000);
        }

        // 啟動渲染
        renderCards();
    </script>
